name: quickreach
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.1.0
  lottie: ^2.7.0
  shimmer: ^3.0.0

  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  sqflite: ^2.3.0
  path: ^1.9.0
