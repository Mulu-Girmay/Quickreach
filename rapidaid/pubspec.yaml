name: rapidaid
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.5
dependencies:
  flutter:
    sdk: flutter

  # UI & Animations
  google_fonts: ^6.1.0 # Custom fonts
  lottie: ^2.7.0 # JSON animations
  shimmer: ^3.0.0 # Loading effects

  # State Management
  flutter_bloc: ^8.1.3 # BLoC pattern
  equatable: ^2.0.5 # Value equality

  # Networking & Connectivity
  dio: ^5.4.0 # HTTP client
  connectivity_plus: ^5.0.2 # Network status detection

  # Local Database (SQLite)
  sqflite: ^2.3.0 # SQLite plugin
  path: ^1.9.0 # Path manipulation
  path_provider: ^2.1.1 # Directory paths

  # Location Services
  geolocator: ^10.1.0 # GPS location
  permission_handler: ^11.3.0 # Runtime permissions

  # Background Processing
  workmanager:
    git:
      url: https://github.com/fluttercommunity/flutter_workmanager.git
      path: workmanager
      ref: main

  # Utilities
  uuid: ^4.3.3 # Generate unique IDs
  intl: ^0.18.1 # Date/time formatting
  shared_preferences: ^2.2.2 # Simple key-value storage
  flutter_secure_storage: ^9.0.0 # Secure token storage

  # Navigation
  go_router: ^12.0.0 # Declarative routing

  # JSON Serialization
  json_annotation: ^4.8.1 # JSON annotations

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8 # Code generation
  json_serializable: ^6.7.1 # JSON serialization
  flutter_lints: ^3.0.0 # Linting rules

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/icons/
